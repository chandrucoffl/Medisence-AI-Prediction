<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Verify OTP — MediSense AI</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
  <style>
    .auth-shell { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; position: relative; z-index: 1; }
    .auth-card { width: 380px; background: var(--panel); border: 1px solid var(--border); clip-path: polygon(0 20px, 20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%); padding: 2rem; text-align: center; backdrop-filter: blur(20px) saturate(160%); box-shadow: 0 24px 70px rgba(0,0,0,0.4); }
    .otp-icon { font-size: 2rem; }
  </style>
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <div class="otp-icon">◈</div>
    <h4 class="mono mt-1" style="font-size:1.1rem;">OTP VERIFICATION</h4>
    <p class="text-muted small">Code sent to <span class="mono" style="color:var(--paper);">{{ mobile }}</span></p>
    <div class="note note-warn small mb-2">
      Demo OTP (auto-shown, no SMS gateway configured): <span class="mono" style="color:var(--amber); font-weight:700;">{{ otp }}</span>
    </div>
    {% if error %}
    <div class="note note-danger small mb-2">{{ error }}</div>
    {% endif %}
    <form action="/verify" method="POST">
      <div class="field-box mb-2">
        <label>4-digit code</label>
        <input type="text" name="otp" placeholder="0000" required/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">Verify →</button>
    </form>
  </div>
</div>
<script src="/static/js/effects.js"></script>
</body>
</html>
